{% extends 'core/admin_base.html' %}
{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-poppins font-black text-slate-800 tracking-tight">Reward Tasks</h1>
            <p class="text-sm text-slate-500 mt-1">Manage user tasks and diamond rewards.</p>
        </div>
        <button onclick="openSlideOver('Create New Task', 'Task form coming...')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm btn-press transition flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> New Task
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for task in tasks %}
        <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover-lift group">
            <div class="flex justify-between items-start mb-4">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-2xl shadow-sm">
                    <i class="{{ task.icon_class }}"></i>
                </div>
                <div class="flex gap-2">
                    <button class="text-slate-400 hover:text-blue-600 transition"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button class="text-slate-400 hover:text-rose-600 transition"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <h3 class="font-bold text-slate-800">{{ task.title }}</h3>
            <div class="mt-2 flex items-center justify-between">
                <span class="text-xs font-bold text-amber-500 bg-amber-50 px-2 py-1 rounded-md">
                    <i class="fa-solid fa-gem mr-1"></i> +{{ task.reward_diamonds }}
                </span>
                <span class="text-[10px] uppercase font-black text-slate-400 tracking-widest">{{ task.task_type }}</span>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-50 flex items-center justify-between">
                <p class="text-[10px] text-slate-400">Status: <span class="text-emerald-500 font-bold">Live</span></p>
                <button class="text-2xl text-emerald-500"><i class="fa-solid fa-toggle-on"></i></button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
