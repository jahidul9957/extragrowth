{% extends 'core/base.html' %}

{% block content %}
<style>
    .glass-box {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 255, 204, 0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .neon-input {
        background: rgba(0,0,0,0.3) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: #00ffcc !important;
    }
    .neon-input:focus {
        border-color: #00ffcc !important;
        box-shadow: 0 0 10px rgba(0, 255, 204, 0.5) !important;
        outline: none;
    }
</style>

<div class="flex justify-center items-center min-h-screen pt-10 pb-10">
    <div class="glass-box rounded-3xl p-8 max-w-md w-full text-center relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-screen filter blur-3xl opacity-30"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-green-500 rounded-full mix-blend-screen filter blur-3xl opacity-30"></div>

        <h2 class="text-3xl font-extrabold text-white mb-2 z-10 relative">Add <span class="text-[#00ffcc]">Funds</span></h2>
        <p class="text-gray-400 text-sm mb-6 z-10 relative">Scan the QR code and enter your UTR number below.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-black/50 border {% if message.tags == 'success' %}border-green-500 text-green-400{% else %}border-red-500 text-red-400{% endif %} rounded-xl p-3 mb-4 text-sm font-semibold">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <div class="bg-white p-2 rounded-xl inline-block mb-4 shadow-[0_0_20px_rgba(255,255,255,0.2)] z-10 relative">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=your-upi-id@ybl&pn=NextGen%20Ai%20Dev" alt="QR Code" class="rounded-lg w-40 h-40">
        </div>
        
        <div class="bg-black/40 rounded-lg py-2 px-4 mb-6 z-10 relative border border-white/5">
            <p class="text-gray-300 text-xs">Or Pay to UPI ID:</p>
            <p class="text-[#00ffcc] font-bold tracking-wider">your-upi-id@ybl</p>
        </div>

        <form method="POST" class="space-y-4 z-10 relative">
            {% csrf_token %}
            <div class="text-left">
                <label class="text-gray-300 text-sm font-semibold ml-1">Amount Paid (₹)</label>
                <input type="number" name="amount" required placeholder="e.g. 500" class="neon-input w-full mt-1 p-3 rounded-xl transition-all">
            </div>
            
            <div class="text-left">
                <label class="text-gray-300 text-sm font-semibold ml-1">UTR / Transaction ID</label>
                <input type="text" name="utr_number" required placeholder="12-digit UTR number" class="neon-input w-full mt-1 p-3 rounded-xl transition-all">
            </div>

            <button type="submit" class="w-full py-3 mt-4 bg-gradient-to-r from-[#00d2ff] to-[#3a7bd5] text-white font-bold rounded-xl hover:scale-105 transition-transform shadow-[0_0_15px_rgba(0,210,255,0.4)]">
                Submit Payment Request
            </button>
        </form>

    </div>
</div>
{% endblock %}
