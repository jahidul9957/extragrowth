<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Funds - NextGen</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        
        /* Smooth UI Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        
        /* Loader & Alerts */
        .loader-ring { border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .toast-enter { transform: translateY(-150%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased text-slate-800">

    <div id="page-loader" class="fixed inset-0 z-[99999] bg-slate-50 flex items-center justify-center transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <div class="loader-ring mb-4"></div>
            <p class="text-xs font-bold text-slate-400 font-poppins tracking-widest uppercase animate-pulse">Secure Gateway...</p>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 w-11/12 max-w-sm pointer-events-none"></div>

    <div class="max-w-md mx-auto relative h-screen flex flex-col bg-slate-50">

        <div class="bg-white px-5 py-4 flex items-center justify-between shadow-sm sticky top-0 z-50 border-b border-slate-100">
            <a href="{% url 'home' %}" class="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition btn-press">
                <i class="fa-solid fa-arrow-left text-lg"></i>
            </a>
            <h1 class="text-lg font-black font-poppins text-slate-800 tracking-tight">Add Funds</h1>
            <div class="w-10"></div> 
        </div>

        <div class="flex-1 overflow-y-auto p-5 pb-10">
            
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-3xl p-5 mb-6 text-white shadow-lg flex items-center justify-between relative overflow-hidden animate-fade-up">
                <i class="fa-solid fa-wallet absolute right-4 text-6xl opacity-10 transform -rotate-12"></i>
                <div class="relative z-10">
                    <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest mb-1">Current Balance</p>
                    <h2 class="text-3xl font-black font-poppins">₹{{ request.user.wallet_balance }}</h2>
                </div>
                <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-sm border border-white/10 relative z-10">
                    <i class="fa-solid fa-indian-rupee-sign text-xl"></i>
                </div>
            </div>

            <div class="mb-6 animate-fade-up delay-100">
                <h3 class="font-bold text-slate-700 text-sm mb-3 px-1">Pay via UPI Apps</h3>
                
                <div class="grid grid-cols-3 gap-3">
                    <a href="phonepe://pay?pa=pay2nextgen@ybl&pn=NextGenPanel&cu=INR" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 hover:border-purple-300 hover:shadow-md transition-all btn-press group">
                        <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-full flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-p"></i> </div>
                        <span class="text-[10px] font-bold text-slate-600">PhonePe</span>
                    </a>
                    
                    <a href="gpay://upi/pay?pa=pay2nextgen@ybl&pn=NextGenPanel&cu=INR" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 hover:border-blue-300 hover:shadow-md transition-all btn-press group">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                            <i class="fa-brands fa-google"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-600">GPay</span>
                    </a>

                    <a href="upi://pay?pa=pay2nextgen@ybl&pn=NextGenPanel&cu=INR" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center gap-2 hover:border-emerald-300 hover:shadow-md transition-all btn-press group">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                        <span class="text-[10px] font-bold text-slate-600">Any UPI</span>
                    </a>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 animate-fade-up delay-200">
                <h3 class="font-bold text-slate-700 text-sm mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-shield-halved text-emerald-500"></i> Verify Payment
                </h3>
                
                <form method="POST" action="{% url 'add_funds' %}" class="space-y-4" onsubmit="return validateForm(event)">
                    {% csrf_token %}
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 px-1">Amount Paid (₹)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
                            <input type="number" name="amount" required min="10" placeholder="e.g. 500" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-9 pr-4 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition shadow-sm">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 px-1">12-Digit UTR Number</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="fa-solid fa-hashtag"></i></span>
                            <input type="text" id="utr_input" name="utr_number" required placeholder="Example: 312456789012" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3.5 pl-10 pr-4 text-sm font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50 transition shadow-sm tracking-widest font-mono">
                        </div>
                        <p class="text-[9px] text-slate-400 mt-1.5 px-1 font-medium">*Check your payment app history for the 12-digit UTR/Ref No.</p>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold text-sm py-4 rounded-2xl shadow-md shadow-blue-500/30 hover:bg-blue-700 transition btn-press mt-2 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> Submit UTR
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script>
        // 1. Initial Page Loader Fade Out
        window.addEventListener('load', function() {
            setTimeout(() => { document.getElementById('page-loader').style.opacity = '0'; setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 500); }, 300); 
        });

        // 2. Custom Toast Alert System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let icon = 'fa-circle-check', bg = 'bg-white', border = 'border-emerald-200', text = 'text-emerald-600', iconBg = 'bg-emerald-50';
            if (type === 'error') { icon = 'fa-circle-exclamation'; border = 'border-rose-200'; text = 'text-rose-600'; iconBg = 'bg-rose-50'; }
            if (type === 'info') { icon = 'fa-circle-info'; border = 'border-blue-200'; text = 'text-blue-600'; iconBg = 'bg-blue-50'; }

            toast.className = `flex items-center p-3 rounded-2xl shadow-lg border ${border} ${bg} toast-enter transition-all duration-500 pointer-events-auto`;
            toast.innerHTML = `<div class="${iconBg} ${text} w-8 h-8 rounded-full flex items-center justify-center shrink-0"><i class="fa-solid ${icon} text-sm"></i></div><p class="ml-3 text-xs font-bold text-slate-700 flex-1">${message}</p><button onclick="this.parentElement.remove()" class="ml-2 text-slate-400 hover:text-slate-600 p-1"><i class="fa-solid fa-xmark"></i></button>`;
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-active'); });
            setTimeout(() => { toast.classList.remove('toast-active'); toast.classList.add('toast-enter'); setTimeout(() => toast.remove(), 500); }, 4000);
        }

        // Catch Backend Django Messages (Duplicate UTR error handling happens here)
        document.addEventListener("DOMContentLoaded", () => {
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %} showToast("{{ message|escapejs }}", "error");
                    {% elif message.tags == 'success' %} showToast("{{ message|escapejs }}", "success");
                    {% else %} showToast("{{ message|escapejs }}", "info");
                    {% endif %}
                {% endfor %}
            {% endif %}
        });

        // 3. STRICT UTR LIVE VALIDATION (No spaces, No Alphabets, Max 12)
        const utrInput = document.getElementById('utr_input');
        utrInput.addEventListener('input', function(e) {
            // Remove any non-numeric characters (ABC, spaces, symbols) instantly
            this.value = this.value.replace(/\D/g, '');
            
            // Lock length to exactly 12 digits
            if (this.value.length > 12) {
                this.value = this.value.slice(0, 12);
            }
        });

        // 4. Form Submission Final Check
        function validateForm(event) {
            const utrLength = utrInput.value.length;
            
            // Check if it's strictly 12 digits before sending to backend
            if (utrLength !== 12) {
                event.preventDefault(); // Stop form submission
                showToast(`UTR must be exactly 12 digits. You entered ${utrLength}.`, "error");
                
                // Vibrate phone if mobile (creates premium error feel)
                if(navigator.vibrate) navigator.vibrate(200); 
                
                // Shake animation on input
                utrInput.classList.add('border-rose-500', 'bg-rose-50');
                setTimeout(() => utrInput.classList.remove('border-rose-500', 'bg-rose-50'), 1000);
                return false;
            }

            // If everything is correct, show loading state
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-lg"></i> Verifying...';
            btn.classList.replace('bg-blue-600', 'bg-blue-400');
            btn.style.pointerEvents = 'none';
            return true;
        }
    </script>
</body>
    </html>
