<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Ai Dev | SMM Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🌟 Master Dark Theme */
        body {
            background: linear-gradient(135deg, #090b10, #161b22, #0d1117);
            color: #e6edf3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* 🌟 Glassmorphism Navbar */
        .glass-nav {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        /* 🌟 Neon Hover Links */
        .nav-link {
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #00ffcc !important;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="glass-nav fixed w-full z-50 top-0 left-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <div class="flex-shrink-0">
                    <a href="{% url 'home' %}" class="text-2xl font-extrabold text-white tracking-wider hover:scale-105 transition-transform inline-block">
                        NEXTGEN<span class="text-[#00ffcc]">AI</span>
                    </a>
                </div>

                <div class="hidden md:block">
                    <div class="ml-10 flex items-center space-x-6">
                        <a href="{% url 'home' %}" class="nav-link text-gray-300 font-bold px-3 py-2 rounded-md">Dashboard</a>
                        <a href="{% url 'new_order' %}" class="nav-link text-gray-300 font-bold px-3 py-2 rounded-md">New Order</a>
                        <a href="{% url 'services' %}" class="nav-link text-gray-300 font-bold px-3 py-2 rounded-md">Services</a>
                        <a href="{% url 'add_funds' %}" class="nav-link text-gray-300 font-bold px-3 py-2 rounded-md">Add Funds</a>
                        
                        {% if request.user.is_staff %}
                        <a href="/admin/" target="_blank" class="nav-link text-purple-400 font-bold px-3 py-2 rounded-md">Admin Panel</a>
                        {% endif %}

                        <div class="ml-4 px-4 py-1.5 bg-black/40 border border-[#00ffcc]/40 rounded-full shadow-[0_0_10px_rgba(0,255,204,0.2)]">
                            <span class="text-xs text-gray-400 mr-1">Balance:</span>
                            <span class="text-[#00ffcc] font-bold">₹{% if request.user.is_authenticated %}{{ request.user.wallet_balance }}{% else %}0.00{% endif %}</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <div class="pt-24 px-4 md:px-8 max-w-7xl mx-auto">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
