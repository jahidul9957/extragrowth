{% extends 'core/base.html' %}
{% block content %}
<div class="text-center mb-8">
    <h2 class="text-3xl font-bold text-white">Our Services</h2>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for service in services %}
    <div class="bg-white/5 backdrop-blur-md border border-[#00ffcc]/20 rounded-2xl p-5 shadow-lg relative overflow-hidden transition hover:scale-105 hover:border-[#00ffcc]">
        <div class="absolute -top-5 -right-5 w-16 h-16 bg-blue-500 rounded-full mix-blend-screen filter blur-2xl opacity-40"></div>
        <span class="bg-[#00ffcc]/20 text-[#00ffcc] text-xs font-bold px-2 py-1 rounded-md">{{ service.category }}</span>
        <h3 class="text-lg font-bold text-white mt-3">{{ service.name }}</h3>
        <p class="text-gray-400 text-sm mt-1">Min: {{ service.min_order }} | Max: {{ service.max_order }}</p>
        <div class="mt-4 flex justify-between items-center">
            <span class="text-xl font-extrabold text-[#00ffcc]">₹{{ service.price_per_1000 }}<span class="text-xs text-gray-400">/1k</span></span>
            <a href="{% url 'new_order' %}?service={{ service.id }}" class="px-4 py-2 bg-gradient-to-r from-[#00d2ff] to-[#3a7bd5] rounded-lg text-white font-bold text-sm shadow-md">Order Now</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
