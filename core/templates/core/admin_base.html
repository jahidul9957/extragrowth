<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Command Center{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #334155; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        
        /* Sidebar Transitions */
        .sidebar-expanded { width: 260px; }
        .sidebar-collapsed { width: 80px; }
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-text { transition: opacity 0.2s; }
        .sidebar-collapsed .sidebar-text { opacity: 0; display: none; }
        
        /* Content Transitions */
        .content-expanded { margin-left: 260px; }
        .content-collapsed { margin-left: 80px; }
        #main-content { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Component Animations */
        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .btn-press:active { transform: scale(0.95); }
        
        /* Shimmer Skeleton Loader */
        .skeleton { background: #e2e8f0; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 5px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }

        /* Slide-over & Modal */
        #slide-over { transition: transform 0.3s ease-in-out; }
        .translate-x-full { transform: translateX(100%); }
        .translate-x-0 { transform: translateX(0); }
        .fade-in { animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="antialiased overflow-hidden flex h-screen">

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-slate-200 flex flex-col h-full z-40 fixed left-0 top-0 overflow-y-auto overflow-x-hidden shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-slate-100 shrink-0">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shrink-0 shadow-md">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <span class="sidebar-text font-poppins font-bold text-lg text-slate-800 ml-3 tracking-tight">AdminPanel</span>
        </div>

        <nav class="flex-1 py-6 px-3 space-y-1">
            <a href="{% url 'custom_admin' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group {% if request.resolver_match.url_name == 'custom_admin' %}bg-blue-50 text-blue-600 font-semibold{% endif %}">
                <i class="fa-solid fa-chart-pie w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Dashboard</span>
            </a>
            <a href="{% url 'admin_users' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group {% if request.resolver_match.url_name == 'admin_users' %}bg-blue-50 text-blue-600 font-semibold{% endif %}">
                <i class="fa-solid fa-users w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Users</span>
            </a>
            <a href="{% url 'admin_services' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group {% if request.resolver_match.url_name == 'admin_services' %}bg-blue-50 text-blue-600 font-semibold{% endif %}">
                <i class="fa-solid fa-box-open w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Services</span>
            </a>
            <a href="{% url 'admin_payments' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group {% if request.resolver_match.url_name == 'admin_payments' %}bg-blue-50 text-blue-600 font-semibold{% endif %}">
                <i class="fa-solid fa-wallet w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Payments</span>
            </a>
            <a href="{% url 'admin_bots' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group {% if request.resolver_match.url_name == 'admin_bots' %}bg-blue-50 text-blue-600 font-semibold{% endif %}">
                <i class="fa-solid fa-robot w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Bots</span>
            </a>
            
            <div class="sidebar-text pt-4 pb-2 px-3 text-xs font-bold text-slate-400 uppercase tracking-wider">System</div>
            <a href="{% url 'admin_settings' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition group">
                <i class="fa-solid fa-gear w-6 text-center text-lg"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Settings</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <button onclick="toggleSidebar()" class="w-full flex items-center px-3 py-2 rounded-xl text-slate-500 hover:bg-slate-100 transition">
                <i class="fa-solid fa-compress w-6 text-center"></i>
                <span class="sidebar-text ml-3 text-sm font-medium">Collapse</span>
            </button>
        </div>
    </aside>

    <div id="main-content" class="content-expanded flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-30">
            <div class="flex items-center bg-slate-100 px-4 py-2 rounded-lg w-96 border border-transparent focus-within:border-blue-500 focus-within:bg-white transition">
                <i class="fa-solid fa-search text-slate-400 text-sm"></i>
                <input type="text" placeholder="Search users, orders, or transactions..." class="bg-transparent border-none outline-none text-sm ml-3 w-full text-slate-700 placeholder-slate-400">
                <span class="text-xs text-slate-400 font-mono bg-slate-200 px-1.5 py-0.5 rounded ml-2">⌘K</span>
            </div>

            <div class="flex items-center gap-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-sm btn-press transition flex items-center gap-2" onclick="showToast('Action Menu Opened', 'info')">
                    <i class="fa-solid fa-plus"></i> Quick Action
                </button>
                
                <div class="h-6 w-px bg-slate-200 mx-2"></div>
                
                <button class="text-slate-500 hover:text-blue-600 transition relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                
                <div class="flex items-center gap-3 pl-2">
                    <div class="text-right hidden md:block">
                        <p class="text-sm font-bold text-slate-800 leading-none">Admin</p>
                        <p class="text-[10px] text-slate-500 mt-1">Superuser</p>
                    </div>
                    <div class="w-9 h-9 rounded-full bg-slate-900 text-white flex items-center justify-center shadow-sm">
                        <i class="fa-solid fa-user-tie text-sm"></i>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto bg-slate-50 p-6 relative">
            <div id="page-content" class="fade-in max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <div id="slide-over-overlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[100] hidden transition-opacity opacity-0" onclick="closeSlideOver()"></div>
    <div id="slide-over" class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl z-[101] translate-x-full flex flex-col border-l border-slate-200">
        <div class="h-16 px-6 border-b border-slate-100 flex items-center justify-between shrink-0 bg-slate-50">
            <h3 id="slide-title" class="font-poppins font-bold text-slate-800">Details</h3>
            <button onclick="closeSlideOver()" class="text-slate-400 hover:text-slate-700 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200 btn-press"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div id="slide-content" class="p-6 overflow-y-auto flex-1">
            <div class="space-y-4">
                <div class="skeleton h-4 w-3/4"></div>
                <div class="skeleton h-4 w-1/2"></div>
                <div class="skeleton h-20 w-full mt-6"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[200] hidden flex items-center justify-center opacity-0 transition-opacity">
        <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-md scale-95 transition-transform duration-200 overflow-hidden">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h3 id="modal-title" class="font-poppins font-bold text-lg text-slate-800">Confirm Action</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 transition"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <p id="modal-message" class="text-sm text-slate-600 mb-6">Are you sure you want to proceed?</p>
                <div class="flex gap-3 justify-end">
                    <button onclick="closeModal()" class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg text-sm font-semibold hover:bg-slate-200 transition btn-press">Cancel</button>
                    <button id="modal-confirm" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold hover:bg-red-700 transition btn-press shadow-sm">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Sidebar Toggle Logic
        let sidebarOpen = true;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            if (sidebarOpen) {
                sidebar.classList.replace('sidebar-expanded', 'sidebar-collapsed');
                main.classList.replace('content-expanded', 'content-collapsed');
            } else {
                sidebar.classList.replace('sidebar-collapsed', 'sidebar-expanded');
                main.classList.replace('content-collapsed', 'content-expanded');
            }
            sidebarOpen = !sidebarOpen;
        }

        // 2. Toast Notification System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = 'fa-check-circle', colorClass = 'bg-green-500', bgClass = 'bg-white';
            if (type === 'error') { icon = 'fa-circle-exclamation'; colorClass = 'bg-red-500'; }
            if (type === 'info') { icon = 'fa-circle-info'; colorClass = 'bg-blue-500'; }

            toast.className = `flex items-center p-4 rounded-xl shadow-lg border border-slate-100 ${bgClass} transform translate-x-full transition-all duration-300 pointer-events-auto`;
            toast.innerHTML = `
                <div class="${colorClass} w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0"><i class="fa-solid ${icon} text-sm"></i></div>
                <p class="ml-3 text-sm font-semibold text-slate-700">${message}</p>
                <button onclick="this.parentElement.remove()" class="ml-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => { toast.classList.remove('translate-x-full'); });
            
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // 3. Slide-over Engine
        function openSlideOver(title, htmlContent) {
            document.getElementById('slide-title').innerText = title;
            document.getElementById('slide-content').innerHTML = htmlContent;
            
            const overlay = document.getElementById('slide-over-overlay');
            const panel = document.getElementById('slide-over');
            
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            panel.classList.remove('translate-x-full');
        }
        function closeSlideOver() {
            const overlay = document.getElementById('slide-over-overlay');
            const panel = document.getElementById('slide-over');
            
            panel.classList.add('translate-x-full');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        // 4. Modal Engine
        function openModal(title, message, confirmCallback, isDanger = true) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const confirmBtn = document.getElementById('modal-confirm');
            confirmBtn.className = `px-4 py-2 text-white rounded-lg text-sm font-semibold transition btn-press shadow-sm ${isDanger ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`;
            
            confirmBtn.onclick = () => {
                confirmCallback();
                closeModal();
            };

            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                box.classList.remove('scale-95');
                box.classList.add('scale-100');
            }, 10);
        }
        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const box = document.getElementById('modal-box');
            
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => overlay.classList.add('hidden'), 200);
        }

        // Auto-show Django Messages via Toasts
        document.addEventListener("DOMContentLoaded", function() {
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %} showToast("{{ message }}", "error");
                    {% elif message.tags == 'success' %} showToast("{{ message }}", "success");
                    {% else %} showToast("{{ message }}", "info");
                    {% endif %}
                {% endfor %}
            {% endif %}
        });
    </script>
</body>
        </html>
