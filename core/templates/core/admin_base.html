<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Command Center{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: #334155; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        
        /* Smooth Slide Transitions */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .translate-x-0 { transform: translateX(0); }
        .-translate-x-full { transform: translateX(-100%); }
        
        #slide-over { transition: transform 0.3s ease-in-out; }
        .translate-x-full { transform: translateX(100%); }
        
        /* Loading Bar Animation */
        #top-loader { transition: width 0.3s ease, opacity 0.3s ease; }
        
        /* Bell Ringing Animation */
        @keyframes ring {
            0% { transform: rotate(0); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            75% { transform: rotate(10deg); }
            100% { transform: rotate(0); }
        }
        .hover-ring:hover { animation: ring 0.5s ease-in-out infinite; }

        .btn-press:active { transform: scale(0.95); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased overflow-hidden flex h-screen">

    <div id="premium-loader" class="fixed inset-0 z-[99999] bg-slate-50 flex items-center justify-center transition-opacity duration-500">
        <div class="flex flex-col items-center">
            <div class="relative w-16 h-16 flex items-center justify-center">
                <div class="absolute inset-0 border-4 border-slate-200 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                <i class="fa-solid fa-bolt text-blue-600 text-xl animate-pulse"></i>
            </div>
            <h2 class="mt-4 text-xs font-bold text-slate-400 font-poppins tracking-widest uppercase animate-pulse">Initializing Panel...</h2>
        </div>
    </div>

    <div id="top-loader" class="fixed top-0 left-0 h-1 bg-blue-600 z-[9999] w-0 opacity-0 shadow-[0_0_10px_rgba(37,99,235,0.8)]"></div>

    <div id="csrf-token-container" class="hidden">{% csrf_token %}</div>
    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden transition-opacity" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-50 transform -translate-x-full flex flex-col h-full border-r border-slate-200">
        <div class="h-16 flex items-center justify-between px-6 border-b border-slate-100 shrink-0 bg-slate-50">
            <div class="flex items-center">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-md"><i class="fa-solid fa-bolt"></i></div>
                <span class="font-poppins font-bold text-lg text-slate-800 ml-3 tracking-tight">AdminPanel</span>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-700 btn-press"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>

        <nav class="flex-1 py-6 px-3 space-y-1 overflow-y-auto">
            <a href="{% url 'custom_admin' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-chart-pie w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Dashboard</span></a>
            <a href="{% url 'admin_users' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-users w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Users</span></a>
            <a href="{% url 'admin_services' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-box-open w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Services</span></a>
            <a href="{% url 'admin_payments' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-wallet w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Payments</span></a>
            <a href="{% url 'admin_bots' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-robot w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Bots</span></a>
            <a href="{% url 'admin_tasks' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-list-check w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Tasks</span></a>
            
            <div class="pt-4 pb-2 px-3 text-xs font-bold text-slate-400 uppercase tracking-wider">System</div>
            <a href="{% url 'admin_settings' %}" class="flex items-center px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-blue-600 transition"><i class="fa-solid fa-gear w-6 text-center text-lg"></i><span class="ml-3 text-sm font-medium">Settings</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden w-full">
        
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-30 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition btn-press">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
            </div>

            <div class="flex items-center gap-5">
                                <a href="{% url 'admin_logs' %}" class="text-slate-500 hover:text-blue-600 transition relative group hover-ring" title="System Logs">
                    <i class="fa-solid fa-bell text-xl"></i>
                    {% if request.user.unread_notifications > 0 %}
                    <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white animate-pulse"></span>
                    {% endif %}
                                </a>
                
                
                <div class="h-6 w-px bg-slate-200 mx-1"></div>
                
                <a href="{% url 'admin_settings' %}" class="w-9 h-9 rounded-full bg-slate-100 text-slate-600 border border-slate-200 flex items-center justify-center shadow-sm overflow-hidden bg-cover bg-center transition hover:shadow-md"
                   {% if request.user.profile_image %}style="background-image: url('{{ request.user.profile_image.url }}');"{% endif %}>
                    {% if not request.user.profile_image %}<i class="fa-solid fa-user-tie text-sm"></i>{% endif %}
                </a>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto bg-slate-50 p-6">
            <div class="max-w-7xl mx-auto fade-in">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <div id="slide-over-overlay" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[100] hidden" onclick="closeSlideOver()"></div>
    <div id="slide-over" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-[101] translate-x-full flex flex-col border-l border-slate-200">
        <div class="h-16 px-6 border-b border-slate-100 flex items-center justify-between shrink-0 bg-slate-50">
            <h3 id="slide-title" class="font-poppins font-bold text-slate-800">Details</h3>
            <button onclick="closeSlideOver()" class="text-slate-400 hover:text-slate-700 btn-press"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div id="slide-content" class="p-6 overflow-y-auto flex-1"></div>
    </div>

    <script>
        // 1. Premium Full-Screen Loader Logic
        window.addEventListener('load', function() {
            const loader = document.getElementById('premium-loader');
            setTimeout(() => {
                loader.style.opacity = '0'; // Smooth fade out
                setTimeout(() => {
                    loader.style.display = 'none'; // Remove from DOM flow
                }, 500); 
            }, 300); 
        });

        // 2. Sidebar Logic
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        // 3. Slide Over Logic
        function openSlideOver(title, htmlContent) {
            document.getElementById('slide-title').innerText = title;
            document.getElementById('slide-content').innerHTML = htmlContent;
            document.getElementById('slide-over-overlay').classList.remove('hidden');
            document.getElementById('slide-over').classList.remove('translate-x-full');
        }
        function closeSlideOver() {
            document.getElementById('slide-over').classList.add('translate-x-full');
            setTimeout(() => document.getElementById('slide-over-overlay').classList.add('hidden'), 300);
        }

        // 4. Awesome Toast Notifications Logic
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let icon = 'fa-circle-check', color = 'bg-emerald-500';
            if (type === 'error') { icon = 'fa-circle-exclamation'; color = 'bg-rose-500'; }
            if (type === 'info') { icon = 'fa-circle-info'; color = 'bg-blue-500'; }

            toast.className = `flex items-center p-4 rounded-xl shadow-lg border border-slate-100 bg-white transform translate-x-full transition-all duration-300 pointer-events-auto`;
            toast.innerHTML = `
                <div class="${color} w-8 h-8 rounded-full flex items-center justify-center text-white shrink-0"><i class="fa-solid ${icon} text-sm"></i></div>
                <p class="ml-3 text-sm font-semibold text-slate-700">${message}</p>
                <button onclick="this.parentElement.remove()" class="ml-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // 5. Top Loading Bar & Django Messages Integration
        document.addEventListener("DOMContentLoaded", () => {
            const topLoader = document.getElementById('top-loader');
            topLoader.style.width = '100%';
            topLoader.style.opacity = '1';
            setTimeout(() => { topLoader.style.opacity = '0'; }, 300);
            setTimeout(() => { topLoader.style.width = '0'; }, 600);

            // Trigger Django messages as Toast Notifications
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'error' %} showToast("{{ message|escapejs }}", "error");
                    {% elif message.tags == 'success' %} showToast("{{ message|escapejs }}", "success");
                    {% else %} showToast("{{ message|escapejs }}", "info");
                    {% endif %}
                {% endfor %}
            {% endif %}
        });

        // Trigger top loading bar on internal link clicks for smooth SPA feel
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                if (this.hostname === window.location.hostname && !this.getAttribute('href').startsWith('#') && this.getAttribute('target') !== '_blank') {
                    const topLoader = document.getElementById('top-loader');
                    topLoader.style.opacity = '1';
                    topLoader.style.width = '40%';
                }
            });
        });
    </script>
</body>
    </html>
