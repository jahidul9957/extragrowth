{% extends 'core/base.html' %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="space-y-6 animate-fade-in pb-12">

    <div class="glass-card p-6 flex items-center space-x-4">
        <div class="relative">
            <div class="w-20 h-20 rounded-full border-2 border-blue-500 p-1">
                <img src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" alt="Avatar" class="w-full h-full rounded-full object-cover">
            </div>
            <span class="absolute bottom-1 right-1 w-5 h-5 bg-green-500 border-2 border-[#1e293b] rounded-full"></span>
        </div>
        <div>
            <h2 class="text-xl font-bold text-white">JERIFz User</h2>
            <p class="text-sm text-gray-400">+91 9876543210</p>
            <span class="inline-block mt-2 text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Verified Member</span>
        </div>
    </div>

    <div class="glass-card p-6 bg-gradient-to-br from-blue-600/20 to-transparent border-blue-500/20">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-xs text-blue-300 font-medium uppercase tracking-widest">Main Wallet</p>
                <h3 class="text-4xl font-black text-white mt-1">₹500.00</h3>
            </div>
            <div class="bg-blue-500 p-2 rounded-lg shadow-lg">
                <span class="text-2xl">💳</span>
            </div>
        </div>
        <button class="w-full mt-6 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition shadow-xl shadow-blue-500/20 active:scale-95 flex items-center justify-center space-x-2">
            <span>➕</span>
            <span>Add Funds / Deposit</span>
        </button>
    </div>

    <div class="glass-card p-5">
        <h3 class="text-sm font-bold mb-4 text-gray-300">Order Activity (Last 7 Days) 📈</h3>
        <div class="h-40">
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <div class="space-y-3">
        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Account History</h3>
        
        <button class="w-full glass-card p-4 flex items-center justify-between group hover:bg-white/10 transition">
            <div class="flex items-center space-x-4">
                <span class="text-xl bg-purple-500/20 p-2 rounded-lg">📦</span>
                <div class="text-left">
                    <p class="text-sm font-bold text-white">Order History</p>
                    <p class="text-[10px] text-gray-400">Track your subscriber orders</p>
                </div>
            </div>
            <span class="text-gray-500 group-hover:translate-x-1 transition">➜</span>
        </button>

        <button class="w-full glass-card p-4 flex items-center justify-between group hover:bg-white/10 transition">
            <div class="flex items-center space-x-4">
                <span class="text-xl bg-green-500/20 p-2 rounded-lg">💸</span>
                <div class="text-left">
                    <p class="text-sm font-bold text-white">Transaction History</p>
                    <p class="text-[10px] text-gray-400">Wallet deposit records</p>
                </div>
            </div>
            <span class="text-gray-500 group-hover:translate-x-1 transition">➜</span>
        </button>

        <a href="{% url 'login' %}" class="w-full glass-card p-4 flex items-center justify-between group border-red-500/20 hover:bg-red-500/10 transition">
            <div class="flex items-center space-x-4">
                <span class="text-xl bg-red-500/20 p-2 rounded-lg">🚪</span>
                <div class="text-left">
                    <p class="text-sm font-bold text-red-400">Logout</p>
                    <p class="text-[10px] text-gray-500">Sign out from your account</p>
                </div>
            </div>
        </a>
    </div>

</div>

<script>
    const ctx2 = document.getElementById('activityChart').getContext('2d');
    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
                label: 'Orders',
                data: [2, 5, 3, 8, 4, 6, 9],
                backgroundColor: '#3b82f6',
                borderRadius: 5,
                barThickness: 15,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
                y: { display: false }
            }
        }
    });
</script>

<style>
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
