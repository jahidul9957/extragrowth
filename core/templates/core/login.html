<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
    // 2. Telegram App ko initialize karein
    const tg = window.Telegram.WebApp;
    
    // App ko full-screen me open karne ke liye
    tg.expand(); 
    
    // 3. User ka khufiya data (Hash) nikaalein
    const initData = tg.initData;

    // 4. Agar user Telegram se aaya hai, to silent login karein
    if (initData) {
        // Ek chhota sa loader dikha sakte hain yahan
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px; font-family:sans-serif;'>Authenticating... 🚀</h2>";

        fetch('/api/telegram-auth/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ initData: initData })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                // Login successful! Seedha Home page par le jao
                window.location.href = data.redirect_url || '/';
            } else {
                alert("Auth Failed: " + data.message);
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>
