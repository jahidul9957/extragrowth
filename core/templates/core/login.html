<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JERIFz SMM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-card w-full max-w-sm p-8 animate-fade-in relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/30 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-600/30 rounded-full blur-3xl"></div>

        <div class="relative z-10 text-center mb-8">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
                JERIFz SMM
            </h1>
            <p class="text-sm text-gray-400">Login or Register to continue</p>
        </div>

        <form action="{% url 'home' %}" method="GET" class="relative z-10 space-y-4">
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1 pl-1">Mobile Number</label>
                <div class="relative">
                    <span class="absolute left-3 top-3.5 text-gray-400 text-sm">📞</span>
                    <input type="tel" placeholder="Enter your 10-digit number" required
                           class="w-full bg-black/20 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1 pl-1">Password / OTP</label>
                <div class="relative">
                    <span class="absolute left-3 top-3.5 text-gray-400 text-sm">🔒</span>
                    <input type="password" placeholder="Enter Password" required
                           class="w-full bg-black/20 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3.5 rounded-xl transition shadow-lg shadow-blue-500/30 active:scale-95">
                Login Securely
            </button>
        </form>

        <div class="mt-6 text-center relative z-10">
            <p class="text-xs text-gray-500">By continuing, you agree to our Terms & Policy.</p>
        </div>
    </div>

</body>
</html>
