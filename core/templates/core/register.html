<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - NextGen SMM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 antialiased min-h-screen flex flex-col justify-center relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-full opacity-40 pointer-events-none">
        <div class="absolute w-96 h-96 bg-purple-300 rounded-full blur-3xl -top-20 -right-20"></div>
        <div class="absolute w-96 h-96 bg-blue-300 rounded-full blur-3xl bottom-10 left-10"></div>
    </div>

    <div class="max-w-md w-full mx-auto p-6 relative z-10 py-12">
        <a href="{% url 'home' %}" class="inline-flex items-center text-sm font-semibold text-slate-500 hover:text-purple-600 transition mb-6">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
        </a>

        <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl border border-white/50 p-8">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h2 class="text-2xl font-poppins font-bold text-slate-800">Create Account</h2>
                <p class="text-sm text-slate-500 mt-1">Join NextGen SMM today.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="p-3 mb-6 rounded-lg text-sm font-semibold text-center {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100{% else %}bg-green-50 text-green-600 border border-green-100{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'register' %}" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-user text-slate-400"></i>
                        </div>
                        <input type="text" name="username" placeholder="Choose a username" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400"></i>
                        </div>
                        <input type="email" name="email" placeholder="Enter your email" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" name="password" placeholder="Create a password" required class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-3.5 rounded-xl hover:shadow-lg hover:shadow-purple-500/30 hover:-translate-y-0.5 transition-all duration-300 mt-2">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-slate-600 mt-8">
                Already have an account? 
                <a href="{% url 'login' %}" class="font-bold text-purple-600 hover:text-purple-700 hover:underline transition">Log in here</a>
            </p>
        </div>
    </div>
</body>
    </html>
