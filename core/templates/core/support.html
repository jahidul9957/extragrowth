<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - NextGen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 90px; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="antialiased">
    <header class="flex items-center px-6 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100">
        <a href="{% url 'home' %}" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-600 hover:bg-slate-200 transition active:scale-95"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 class="ml-4 font-poppins font-bold text-lg text-slate-800">Customer Care</h1>
    </header>

    <div class="px-6 py-8">
        <div class="text-center mb-8">
            <img src="https://cdn-icons-png.flaticon.com/512/4144/4144806.png" class="w-24 h-24 mx-auto mb-4 opacity-90" alt="Support">
            <h2 class="text-2xl font-poppins font-black text-slate-800">Need Help?</h2>
            <p class="text-sm text-slate-500 mt-2">We're here for you 24/7. Choose an option below to connect with our team.</p>
        </div>

        <div class="space-y-4">
            <a href="https://t.me/YourSupportBot" target="_blank" class="block w-full bg-blue-500 text-white p-5 rounded-2xl shadow-lg shadow-blue-500/30 flex items-center justify-between active:scale-95 hover:-translate-y-1 transition duration-300">
                <div class="flex items-center gap-4">
                    <i class="fa-brands fa-telegram text-3xl"></i>
                    <div class="text-left">
                        <h3 class="font-bold text-lg">Telegram Support</h3>
                        <p class="text-xs text-blue-100">Fastest response time (1-5 min)</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right opacity-70"></i>
            </a>

            <a href="mailto:support@nextgen.com" class="block w-full bg-white text-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between active:scale-95 hover:-translate-y-1 hover:border-slate-300 transition duration-300">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-100 text-slate-600 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-envelope"></i></div>
                    <div class="text-left">
                        <h3 class="font-bold">Email Us</h3>
                        <p class="text-xs text-slate-500">support@nextgen.com</p>
                    </div>
                </div>
            </a>
            
            <div class="block w-full bg-slate-50 text-slate-400 p-5 rounded-2xl border border-slate-100 flex items-center justify-between cursor-not-allowed">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-slate-200 text-slate-400 rounded-full flex items-center justify-center text-lg"><i class="fa-solid fa-comments"></i></div>
                    <div class="text-left">
                        <h3 class="font-bold">Live Chat</h3>
                        <p class="text-xs">Coming soon...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
